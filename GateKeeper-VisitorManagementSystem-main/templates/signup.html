<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | GateKeeper</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #2BAE66;
            --primary-dark: #1e8a4f;
            --primary-light: #e6f7ee;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fbf9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(0,0,0,0.03);
            margin: 20px;
        }

        .brand-logo {
            color: var(--primary-color);
            font-size: 2rem;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .form-label {
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        .form-control {
            border-radius: 12px;
            padding: 10px 16px;
            border: 1px solid #eee;
            background-color: #fcfcfc;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .btn-primary-custom {
            background-color: var(--primary-color);
            border: none;
            color: white;
            padding: 14px;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 15px;
        }

        .btn-primary-custom:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(43, 174, 102, 0.2);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            color: #666;
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .alert-custom {
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: none;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <a href="/" class="brand-logo">
            <i class="bi bi-shield-check"></i> GateKeeper
        </a>
        
        <h3 class="fw-bold mb-1">Create Account</h3>
        <p class="text-muted mb-4">Join GateKeeper to manage visitors efficiently</p>

        <!-- Error Messages -->
        {% if errors %}
          <div class="alert alert-danger alert-custom">
            <ul class="mb-0 ps-3">
              {% for error in errors %}
                <li>{{ error }}</li>
              {% endfor %}
            </ul>
          </div>
        {% endif %}

        <form action="/signup" method="POST">
            <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" name="name" value="{{ form_data.name if form_data else '' }}" placeholder="John Doe" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" value="{{ form_data.email if form_data else '' }}" placeholder="name@company.com" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="confirm_password" class="form-label">Confirm</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary-custom">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login">Log In</a>
        </div>
    </div>

</body>
</html>
